<main>

<section class="cart-box">

<h1>Checkout</h1>
<p>Complete your order details below</p>

<form id="checkoutForm">

<input type="text" id="fullName" placeholder="Full Name" required><br><br>

<input type="text" id="address" placeholder="Full Address" required><br><br>

<input type="text" id="phone" placeholder="Phone Number" required><br><br>

<select id="paymentMethod" required>
<option value="">Select Payment Method</option>
<option value="COD">Cash on Delivery</option>
<option value="Card">Debit / Credit Card</option>
<option value="JazzCash">JazzCash</option>
<option value="EasyPaisa">EasyPaisa</option>
</select><br><br>

<button type="submit">Place Order</button>

</form>

</section>

</main>

</footer>
